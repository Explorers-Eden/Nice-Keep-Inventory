name: Update Enchantments Website

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-website-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone website repository
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: bash scripts/clone-enchantments-website-repo.sh

      - name: Update data/enchantments.json
        run: python scripts/update-enchantments-website-data.py

      - name: Commit and push website changes
        working-directory: website-repo
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: bash ../scripts/commit-enchantments-website-changes.sh
